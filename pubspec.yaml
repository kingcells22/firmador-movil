name: firmador_movil
description: "A new Flutter project."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.12.0-113.2.beta

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  file_picker: ^10.3.10
  syncfusion_flutter_pdfviewer: ^32.2.9
  http: ^1.6.0
  path_provider: ^2.1.5
  shared_preferences: ^2.5.4
  # --- NUEVAS LIBRERÍAS DE BIOMETRÍA Y SEGURIDAD ---
  local_auth: ^2.1.8
  flutter_secure_storage: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1 # <-- La librería inyectada aquí

flutter:
  uses-material-design: true

  # Aquí estamos declarando nuestra carpeta de recursos para los logos
  assets:
    - assets/img/

# --- CONFIGURACIÓN DEL ÍCONO DE LA APP ---
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/img/SOFII.png" # Tomará este logo para el cajón de apps
